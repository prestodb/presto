name: kudu

on:
  pull_request:
    paths-ignore:
      - presto-docs/**

env:
  # An envar that signals to tests we are executing in the CI environment
  CONTINUOUS_INTEGRATION: true
  MAVEN_OPTS: -Xmx1024M -XX:+ExitOnOutOfMemoryError
  MAVEN_INSTALL_OPTS: -Xmx2G -XX:+ExitOnOutOfMemoryError
  MAVEN_FAST_INSTALL: -B -V --quiet -T 1C -DskipTests -Dair.check.skip-all -Dmaven.javadoc.skip=true
  RETRY: .github/bin/retry

jobs:
  kudu:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        java: ['17']
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: ${{ github.workflow }}-kudu-${{ github.event.pull_request.number }}-${{ matrix.java }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Download nodejs to maven cache
        run: .github/bin/download_nodejs
      - name: Maven Install
        run: |
          export MAVEN_OPTS="${MAVEN_INSTALL_OPTS}"
          ./mvnw install ${MAVEN_FAST_INSTALL} -am --no-transfer-progress -pl presto-kudu
      - name: Kudu Tests
        run: |
          presto-kudu/bin/run_kudu_tests.sh 3 null
          presto-kudu/bin/run_kudu_tests.sh 1 ""
          presto-kudu/bin/run_kudu_tests.sh 1 presto::
