name: Code Promote
description: Promote code to production (rebase, build, verify, push to master/main)
title: "code-promote"
labels: []
body:
  - type: input
    id: presto_commit
    attributes:
      label: Presto commit
      description: Branch name or commit SHA in perfleap/presto to promote from
      placeholder: "e.g., master-testing or abc1234def5678"
    validations:
      required: true

  - type: input
    id: velox_commit
    attributes:
      label: Velox commit
      description: (Optional) Branch name or commit SHA in perfleap/velox. If not specified, uses the velox submodule pointer from the presto commit.
      placeholder: "e.g., main or a1b2c3d4 (leave empty to use submodule)"
    validations:
      required: false
